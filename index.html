<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADAR 3.4 | Strateegiline Juhtimispaneel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-link { @apply flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 hover:bg-blue-50 hover:text-blue-600 transition-all font-medium; }
        .sidebar-link.active { @apply bg-blue-600 text-white shadow-lg shadow-blue-200; }
        .kpi-card { @apply bg-white p-6 rounded-2xl border border-slate-100 shadow-sm transition-transform hover:scale-[1.02]; }
        .main-card { @apply bg-white p-8 rounded-3xl border border-slate-100 shadow-sm; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 bg-white border-r border-slate-100 p-6 flex flex-col">
        <div class="mb-10 px-4">
            <h1 class="text-2xl font-bold text-slate-900">RADAR <span class="text-blue-600">3.4</span></h1>
            <p class="text-slate-400 text-xs mt-1 uppercase tracking-widest">Strateegiline Seire</p>
        </div>
        
        <nav class="space-y-2 flex-1">
            <a href="#" onclick="switchView('view-main')" class="sidebar-link active" id="nav-main">
                <span class="w-5 h-5">📊</span> Töölaud
            </a>
            <a href="#" onclick="switchView('view-history')" class="sidebar-link" id="nav-history">
                <span class="w-5 h-5">📜</span> Arhiiv
            </a>
            <a href="#" class="sidebar-link opacity-50 cursor-not-allowed">
                <span class="w-5 h-5">⚙️</span> Seaded
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-bold text-slate-900">Tere tulemast, Peaekspert</h2>
                <p class="text-slate-500">Sinu strateegiline ülevaade on valmis.</p>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-xs font-semibold bg-green-100 text-green-700 px-3 py-1 rounded-full uppercase">Süsteem Aktiivne</span>
            </div>
        </header>

        <!-- KPI Kaardid -->
        <div class="grid grid-cols-4 gap-6 mb-10">
            <div class="kpi-card"><p class="text-slate-400 text-xs uppercase mb-1">Jälgitavaid allikaid</p><h4 class="text-2xl font-bold text-slate-900">12</h4></div>
            <div class="kpi-card"><p class="text-slate-400 text-xs uppercase mb-1">Analüüsimata uudiseid</p><h4 class="text-2xl font-bold text-slate-900">3</h4></div>
            <div class="kpi-card"><p class="text-slate-400 text-xs uppercase mb-1">Viimane raport</p><h4 class="text-2xl font-bold text-slate-900">Täna</h4></div>
            <div class="kpi-card"><p class="text-slate-400 text-xs uppercase mb-1">Maine Indeks</p><h4 class="text-2xl font-bold text-blue-600">84%</h4></div>
        </div>

        <!-- Peamine analüüsiala -->
        <div id="view-main" class="grid grid-cols-12 gap-8">
            <div class="col-span-4 space-y-4">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Viimased sündmused</h3>
                <div id="recent-texts-container" class="space-y-4">Laadin andmeid...</div>
            </div>
            
            <div class="col-span-8">
                <div class="main-card">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Uus Analüüsipäring</label>
                    <select id="report-type" class="w-full bg-slate-50 p-4 rounded-xl mb-4 font-medium text-slate-900">
                        <option>Mainekujunduse audit</option>
                        <option>Valdkondade lõimituse raport</option>
                    </select>
                    <textarea id="ai-custom-prompt" class="w-full p-4 bg-slate-50 rounded-xl mb-4 h-32 border-none" placeholder="Kirjelda oma strateegilist fookust..."></textarea>
                    <button onclick="generateReport()" id="gen-btn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-slate-800 transition">Käivita analüüs</button>
                </div>
                
                <div id="ai-insight-content" class="mt-8 space-y-6"></div>
                <div id="action-btns" class="hidden flex gap-4 mt-6">
                    <button onclick="window.print()" class="text-sm font-bold text-slate-500 hover:text-blue-600">Salvesta PDF</button>
                    <button onclick="saadaMeiliga()" class="text-sm font-bold text-blue-600 hover:underline">Saada e-mailile</button>
                </div>
            </div>
        </div>

        <!-- Arhiivivaade -->
        <div id="view-history" class="hidden">
            <h2 class="text-2xl font-bold mb-8">Analüüside Arhiiv</h2>
            <div id="history-container" class="grid grid-cols-2 gap-6"></div>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwU1_EhiDmRyrUscZ-8BLy2RxDeWdO2m46Eme4h-nPn9e64vo7abR6xUfLT3QV1TLDEiw/exec";

        function switchView(viewId) {
            document.getElementById('view-main').classList.toggle('hidden', viewId !== 'view-main');
            document.getElementById('view-history').classList.toggle('hidden', viewId !== 'view-history');
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.getElementById('nav-' + (viewId === 'view-main' ? 'main' : 'history')).classList.add('active');
        }

        async function fetchData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                document.getElementById('recent-texts-container').innerHTML = data.news.map(n => `
                    <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                        <a href="${n.link}" target="_blank" class="font-semibold text-blue-900 hover:underline text-sm block mb-1">${n.title}</a>
                        <p class="text-[11px] text-slate-500 uppercase font-bold">${n.source} | ${n.date}</p>
                    </div>`).join('');
                document.getElementById('history-container').innerHTML = data.history.map(h => `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <div class="text-[10px] text-slate-400 mb-2 font-bold">${h.date}</div>
                        <div class="text-sm text-slate-700">${h.content}</div>
                    </div>`).join('');
            } catch (err) { console.error(err); }
        }

        async function generateReport() {
            const btn = document.getElementById('gen-btn');
            btn.innerText = "Analüüsin...";
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "generate", customPrompt: document.getElementById('ai-custom-prompt').value })
            });
            const data = await res.json();
            document.getElementById('ai-insight-content').innerHTML = data.insight;
            document.getElementById('action-btns').classList.remove('hidden');
            btn.innerText = "Käivita analüüs";
        }

        async function saadaMeiliga() {
            const content = document.getElementById('ai-insight-content').innerHTML;
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "sendEmail", content: content })
            });
            alert("Raport on teele pandud!");
        }

        window.onload = fetchData;
    </script>
</body>
</html>
