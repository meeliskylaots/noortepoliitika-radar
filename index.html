<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADAR 3.4 | Strateegiline Juhtimispaneel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .card { @apply bg-white p-6 rounded-2xl shadow-sm border border-slate-100; }
        .nav-item { @apply w-full text-left p-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-all; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex">

    <aside class="w-72 bg-slate-950 text-white p-8 flex flex-col fixed h-full">
        <div class="mb-12">
            <h1 class="text-2xl font-bold text-white">RADAR <span class="text-blue-500">3.4</span></h1>
            <p class="text-slate-500 text-xs mt-1 uppercase tracking-widest">Strateegiline Seire</p>
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="switchView('view-main')" class="w-full text-left p-3 bg-blue-600 text-white rounded-lg font-semibold">Töölaud</button>
            <button onclick="switchView('view-history')" class="nav-item">Arhiiv</button>
        </nav>
    </aside>

    <main class="flex-1 ml-72 p-12">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h2 class="text-3xl font-bold text-slate-900">Tere tulemast, Peaekspert</h2>
                <p class="text-slate-500">Tänane strateegiline ülevaade on valmis.</p>
            </div>
            <div class="bg-white px-4 py-2 rounded-full border shadow-sm text-xs font-medium text-slate-600">
                <span class="inline-block w-2 h-2 bg-green-500 rounded-full mr-2"></span>Süsteem aktiivne
            </div>
        </header>

        <div id="view-main" class="grid grid-cols-12 gap-8">
            <div class="col-span-4 space-y-4">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Allikad</h3>
                <div id="recent-texts-container" class="space-y-4">Päring käib...</div>
            </div>
            <div class="col-span-8">
                <div class="card mb-8">
                    <select id="report-type" class="w-full border-0 bg-slate-50 p-4 rounded-xl mb-4 font-semibold text-slate-900">
                        <option value="maine">Mainekujunduse audit</option>
                        <option value="loimitus">Valdkondade lõimituse raport</option>
                    </select>
                    <textarea id="ai-custom-prompt" class="w-full bg-slate-50 border-0 p-4 rounded-xl mb-4 h-32 text-sm" placeholder="Kirjelda oma strateegilist fookust..."></textarea>
                    <button onclick="generateReport()" id="gen-btn" class="w-full bg-slate-900 hover:bg-black text-white py-4 rounded-xl font-bold transition">Käivita analüüs</button>
                </div>
                <div id="ai-insight-content" class="space-y-6"></div>
                <div id="action-btns" class="hidden flex gap-4 mt-6">
                    <button onclick="window.print()" class="text-xs font-bold text-slate-600 hover:text-blue-600">Salvesta PDF</button>
                    <button onclick="saadaMeiliga()" class="text-xs font-bold text-blue-600 hover:underline">Saada e-mailile</button>
                </div>
            </div>
        </div>

        <div id="view-history" class="hidden grid grid-cols-1 gap-4">
            <h2 class="text-2xl font-bold text-slate-900 mb-4">Analüüside Arhiiv</h2>
            <div id="history-container"></div>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwU1_EhiDmRyrUscZ-8BLy2RxDeWdO2m46Eme4h-nPn9e64vo7abR6xUfLT3QV1TLDEiw/exec";

        function switchView(viewId) {
            document.getElementById('view-main').classList.toggle('hidden', viewId !== 'view-main');
            document.getElementById('view-history').classList.toggle('hidden', viewId !== 'view-history');
        }

        async function fetchData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                document.getElementById('recent-texts-container').innerHTML = data.news.map(n => `
                    <div class="card">
                        <a href="${n.link}" target="_blank" class="font-bold text-blue-900 hover:underline block">${n.title}</a>
                        <div class="text-[10px] text-slate-400 mt-2 font-bold uppercase">${n.source} | ${n.date}</div>
                    </div>`).join('');
                document.getElementById('history-container').innerHTML = data.history.map(h => `
                    <div class="card">
                        <div class="text-xs text-slate-400 mb-2">${h.date}</div>
                        <div class="prose text-sm text-slate-700">${h.content}</div>
                    </div>`).join('');
            } catch (err) { console.error(err); }
        }

        async function generateReport() {
            const btn = document.getElementById('gen-btn');
            const content = document.getElementById('ai-insight-content');
            btn.innerText = "Analüüsin...";
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "generate", customPrompt: document.getElementById('ai-custom-prompt').value })
                });
                const data = await res.json();
                content.innerHTML = data.insight;
                document.getElementById('action-btns').classList.remove('hidden');
            } catch (err) { alert("Viga: " + err); }
            btn.innerText = "Käivita analüüs";
        }

        async function saadaMeiliga() {
            const content = document.getElementById('ai-insight-content').innerHTML;
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "sendEmail", content: content })
            });
            alert("Raport on teele pandud!");
        }

        window.onload = fetchData;
    </script>
</body>
</html>
