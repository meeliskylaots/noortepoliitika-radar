<div id="ai-insight-container" class="space-y-6">
    <div class="bg-blue-50 p-6 rounded-lg border border-blue-100 mb-6">
        <h3 class="text-lg font-semibold text-blue-900 mb-4">Loo uus analüüs</h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Vali profiil</label>
                <select id="ai-role" class="w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                    <option value="Lõimitud noortepoliitika ja mainekujunduse peaekspert. Fookus on riiklikul strateegial, valdkondade ühendamisel ja maine kujundamisel.">Lõimitud noortepoliitika ja mainekujunduse peaekspert</option>
                    <option value="Haridusinnovatsiooni uurija (Loomelabori mudel). Fookus on teaduspõhisusel, uutel õppemeetoditel ja formaal- ning informaalse hariduse ühendamisel.">Haridusinnovatsiooni uurija</option>
                    <option value="Kogukonnakeskuse juht. Fookus on praktilisel tööl, kohaliku elu edendamisel ja noorte kaasamisel rohujuure tasandil.">Kogukonnajuht</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Erifookus (valikuline)</label>
                <input type="text" id="ai-custom-prompt" placeholder="nt. Keskendu noorte kaasamisele..." class="w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>
        </div>
        
        <button onclick="generateNewReport()" id="generate-btn" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition flex items-center justify-center w-full md:w-auto">
            <span id="btn-text">Genereeri raport kohe</span>
            <svg id="btn-spinner" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </button>
    </div>

    <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
        <h2 class="text-xl font-bold mb-4">Viimane raport</h2>
        <div id="ai-insight-content" class="text-gray-800 space-y-4">
            <p class="text-gray-500">Laen andmeid...</p>
        </div>
    </div>
</div>
