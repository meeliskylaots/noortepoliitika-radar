<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADAR 3.4 | Strateegiline Juhtimispaneel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        /* Tagame, et sidebar on alati paigas */
        .sidebar-item { @apply flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 hover:bg-blue-50 hover:text-blue-600 transition-all font-medium w-full text-left; }
        .sidebar-item.active { @apply bg-blue-600 text-white shadow-lg shadow-blue-200; }
        /* Dashboardi kaardid */
        .kpi-card { @apply bg-white p-6 rounded-2xl border border-slate-100 shadow-sm; }
        .scroll-area { height: calc(100vh - 300px); overflow-y: auto; }
        .main-card { @apply bg-white p-8 rounded-3xl border border-slate-100 shadow-sm; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- VASAK SIDEBAR - FIXEERITUD LAIUS -->
    <aside class="w-64 flex-shrink-0 bg-white border-r border-slate-100 p-6 flex flex-col">
        <div class="mb-10 px-4">
            <h1 class="text-2xl font-bold text-slate-900">RADAR <span class="text-blue-600">3.4</span></h1>
            <p class="text-slate-400 text-[10px] uppercase tracking-widest mt-1">Strateegiline Seire</p>
        </div>
        <nav class="flex flex-col gap-2">
            <button onclick="switchView('view-main')" class="sidebar-item active" id="nav-main">📊 Töölaud</button>
            <button onclick="switchView('view-history')" class="sidebar-item" id="nav-history">📜 Arhiiv</button>
            <button class="sidebar-item opacity-50 cursor-not-allowed">⚙️ Seaded</button>
        </nav>
    </aside>

    <!-- PEAALA - PAINDLIK LAIUS -->
    <main class="flex-1 p-10 overflow-y-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-bold text-slate-900">Tere tulemast, Peaekspert</h2>
            </div>
            <span class="flex items-center gap-2 text-xs font-semibold bg-green-50 text-green-700 px-4 py-2 rounded-full border border-green-100">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Süsteem Aktiivne
            </span>
        </header>

        <!-- KPI RIDA -->
        <div class="grid grid-cols-4 gap-6 mb-10">
            <div class="kpi-card"><p class="text-[10px] text-slate-400 font-bold uppercase">Jälgitavaid allikaid</p><h4 class="text-2xl font-bold text-slate-900 mt-1">12</h4></div>
            <div class="kpi-card"><p class="text-[10px] text-slate-400 font-bold uppercase">Analüüsimata uudiseid</p><h4 class="text-2xl font-bold text-slate-900 mt-1">3</h4></div>
            <div class="kpi-card"><p class="text-[10px] text-slate-400 font-bold uppercase">Viimane raport</p><h4 class="text-2xl font-bold text-slate-900 mt-1">Täna</h4></div>
            <div class="kpi-card"><p class="text-[10px] text-slate-400 font-bold uppercase">Maine Indeks</p><h4 class="text-2xl font-bold text-blue-600 mt-1">84%</h4></div>
        </div>

        <!-- PÕHILAYOUT -->
        <div id="view-main" class="grid grid-cols-12 gap-8">
            <!-- Vasak tulp: Uudised -->
            <div class="col-span-4">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Viimased sündmused</h3>
                <div id="recent-texts-container" class="scroll-area space-y-3 pr-2">Laadin...</div>
            </div>
            
            <!-- Parem tulp: Analüüs -->
            <div class="col-span-8">
                <div class="main-card">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Uus Analüüsipäring</label>
                    <select id="report-type" class="w-full mt-2 bg-slate-50 border-none p-4 rounded-xl mb-4 font-medium focus:ring-2 focus:ring-blue-500">
                        <option>Mainekujunduse audit</option>
                        <option>Valdkondade lõimituse raport</option>
                    </select>
                    <textarea id="ai-custom-prompt" class="w-full p-4 bg-slate-50 rounded-xl mb-4 h-32 border-none focus:ring-2 focus:ring-blue-500" placeholder="Kirjelda oma strateegilist fookust..."></textarea>
                    <button onclick="generateReport()" id="gen-btn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-slate-800 transition">Käivita analüüs</button>
                </div>
                <div id="ai-insight-content" class="mt-8 space-y-6"></div>
            </div>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwU1_EhiDmRyrUscZ-8BLy2RxDeWdO2m46Eme4h-nPn9e64vo7abR6xUfLT3QV1TLDEiw/exec";

        async function fetchData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                document.getElementById('recent-texts-container').innerHTML = data.news.map(n => `
                    <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm hover:border-blue-200 transition">
                        <a href="${n.link}" target="_blank" class="font-semibold text-slate-900 text-sm block mb-1 hover:text-blue-600">${n.title}</a>
                        <div class="flex justify-between items-center text-[10px] text-slate-400 uppercase font-bold tracking-wider">
                            <span>${n.source}</span>
                            <span>${n.date}</span>
                        </div>
                    </div>`).join('');
            } catch(e) { console.error(e); }
        }
        
        async function generateReport() {
            const btn = document.getElementById('gen-btn');
            btn.innerText = "Analüüsin...";
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "generate", customPrompt: document.getElementById('ai-custom-prompt').value })
            });
            const data = await res.json();
            document.getElementById('ai-insight-content').innerHTML = data.insight;
            btn.innerText = "Käivita analüüs";
        }

        window.onload = fetchData;
    </script>
</body>
</html>
