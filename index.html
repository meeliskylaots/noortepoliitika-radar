<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar | Noortepoliitika Seireplatvorm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .prose { color: #334155; font-size: 0.95rem; line-height: 1.6; }
        .prose a { color: #2563eb; text-decoration: underline; font-weight: 500; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen font-sans text-slate-800">

    <aside class="w-64 bg-slate-950 text-white flex flex-col shadow-xl">
        <div class="p-6 border-b border-slate-900">
            <h1 class="text-2xl font-black text-white">RADAR <span class="text-blue-500">3.0</span></h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-widest font-bold">Strateegiline Seire</p>
        </div>
        <nav class="flex-1 mt-6 px-4 space-y-1.5">
            <button onclick="switchView('view-main', this)" class="w-full flex items-center px-4 py-3 rounded-lg bg-blue-600 text-white nav-btn text-sm font-medium">
                <i class="fas fa-th-large w-5 mr-3"></i> Töölaud
            </button>
            <button onclick="switchView('view-history', this)" class="w-full flex items-center px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-900 nav-btn text-sm font-medium">
                <i class="fas fa-folder-open w-5 mr-3"></i> Raportite arhiiv
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white px-8 py-4 border-b flex justify-between items-center">
            <h2 id="page-title" class="text-lg font-bold">Töölaud: Inforuumi seire</h2>
            <button onclick="fetchData()" class="text-xs border px-4 py-2 rounded-lg hover:bg-slate-50 font-semibold text-slate-600">
                <i class="fas fa-rotate mr-2"></i> Värskenda
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div id="view-main" class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 space-y-4">
                    <h3 class="text-xs font-bold uppercase text-slate-400">Viimased monitooritud allikad</h3>
                    <div id="recent-texts-container" class="space-y-3">
                        <p class="text-slate-400 text-sm italic">Laadin andmeid...</p>
                    </div>
                </div>

                <div class="lg:col-span-2 bg-white p-6 rounded-xl border shadow-sm">
                    <h3 class="text-xs font-bold uppercase text-slate-400 mb-4">Strateegiline analüüs ja vaba päring</h3>
                    <div class="space-y-4">
                        <select id="report-type" class="w-full p-2.5 text-sm border rounded-lg bg-slate-50">
                            <option value="maine">Mainekujunduse audit</option>
                            <option value="loimitus">Valdkondade lõimituse raport</option>
                            <option value="vabavorm">VABA PÄRING (AI vastab küsimusele)</option>
                        </select>
                        <textarea id="ai-custom-prompt" rows="4" placeholder="Küsi AI-lt andmete kohta (nt: Millised on peamised maineriskid praegustes pealkirjades?)" class="w-full p-3 text-sm border rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500"></textarea>
                        <button onclick="generateReport()" id="gen-btn" class="w-full bg-blue-900 text-white py-3 rounded-lg font-bold text-sm hover:bg-blue-950">
                            Käivita analüüs
                        </button>
                    </div>
                    <div id="ai-insight-content" class="prose mt-6 pt-6 border-t"></div>
                </div>
            </div>

            <div id="view-history" class="hidden max-w-4xl mx-auto">
                <div id="history-container" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxic9F7g8jwAgWnEMfg43KrHQGtsqltMWcrvg8icnT-FmQfzYJ_wXnv81Vq5hP6_GE_KQ/exec";

        function switchView(viewId, btn) {
            document.querySelectorAll('main > div > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('bg-blue-600', 'text-slate-400'));
            btn.classList.replace('text-slate-400', 'bg-blue-600');
            btn.classList.add('text-white');
        }

        async function fetchData() {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            renderRecent(data.data);
            renderHistory(data.history);
        }

        function renderRecent(data) {
            const container = document.getElementById('recent-texts-container');
            container.innerHTML = data.slice(-10).reverse().map(row => `
                <div class="p-3 bg-white border rounded-lg text-sm">
                    <a href="${row.url}" target="_blank" class="font-bold text-blue-800 hover:underline">${row.title}</a>
                    <p class="text-[10px] text-slate-400 uppercase mt-1">${row.source}</p>
                </div>
            `).join('');
        }

       let controller = new AbortController();

        async function generateReport() {
            const btn = document.getElementById('gen-btn');
            const content = document.getElementById('ai-insight-content');
            
            // Loome uue kontrollija, et saaksime eelmist päringut katkestada
            controller = new AbortController();
            
            btn.innerText = "Analüüsin...";
            btn.disabled = true;
            
            // Loome "Katkesta" nupu
            const abortBtn = document.createElement('button');
            abortBtn.innerText = "Katkesta analüüs";
            abortBtn.className = "w-full mt-2 bg-red-600 text-white py-2 rounded-lg text-xs font-bold hover:bg-red-700";
            abortBtn.id = "abort-btn";
            abortBtn.onclick = () => {
                controller.abort();
                content.innerHTML = '<p class="text-red-600 text-sm">Analüüs katkestatud.</p>';
                btn.innerText = "Käivita analüüs";
                btn.disabled = false;
                abortBtn.remove();
            };
            btn.parentNode.appendChild(abortBtn);

            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    signal: controller.signal, // See ongi katkestamise võti
                    body: JSON.stringify({
                        action: "generate",
                        reportType: document.getElementById('report-type').value,
                        customPrompt: document.getElementById('ai-custom-prompt').value
                    })
                });
                const data = await res.json();
                content.innerHTML = data.insight;
            } catch (err) {
                if (err.name === 'AbortError') {
                    console.log('Kasutaja katkestas.');
                } else {
                    content.innerHTML = '<p class="text-red-500">Viga: ' + err.message + '</p>';
                }
            } finally {
                btn.disabled = false;
                btn.innerText = "Käivita analüüs";
                const existingAbortBtn = document.getElementById('abort-btn');
                if (existingAbortBtn) existingAbortBtn.remove();
            }
        }

        function renderHistory(history) {
            document.getElementById('history-container').innerHTML = history.reverse().map(item => `
                <div class="bg-white p-6 border rounded-lg prose text-sm">
                    <p class="text-[10px] font-bold text-slate-400">${new Date(item.date).toLocaleString()}</p>
                    ${item.content}
                </div>
            `).join('');
        }

        fetchData();
    </script>
</body>
</html>
