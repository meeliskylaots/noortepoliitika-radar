<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Radar 2.0 | Strateegiline Analüüsiagentuur</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-6xl mx-auto p-6">
        <!-- HEADER -->
        <header class="mb-8 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h1 class="text-3xl font-bold text-blue-900">Radar 2.0</h1>
            <p class="text-gray-600">Strateegiline noorteinfo analüüsiagentuur</p>
        </header>

        <!-- DASHBOARD GRID -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            
            <!-- ANALÜÜSI JUHTPANEEL -->
            <div class="md:col-span-1 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-bold mb-4">Loo uus analüüs</h2>
                <div class="space-y-4">
                    <select id="report-type" class="w-full p-2 border rounded">
                        <option value="üldine">Üldine trendianalüüs</option>
                        <option value="maine">Mainekujunduse audit</option>
                    </select>
                    <select id="source-filter" class="w-full p-2 border rounded">
                        <option value="kõik">Kõik allikad</option>
                    </select>
                    <textarea id="ai-custom-prompt" placeholder="Erifookus (nt: analüüsi ERR-i vaimse tervise kajastust)" class="w-full p-2 border rounded h-24 text-sm"></textarea>
                    <button onclick="generateNewReport()" class="w-full bg-blue-900 text-white py-2 rounded font-bold hover:bg-blue-800">Analüüsi</button>
                </div>
            </div>

            <!-- RAPORTI VÄLJUND -->
            <div class="md:col-span-3 bg-white p-8 rounded-xl shadow-sm border border-gray-200 min-h-[500px]">
                <div id="ai-insight-content" class="prose max-w-none text-gray-800">
                    <p class="text-gray-400">Ootan Sinu käsku andmete analüüsimiseks...</p>
                </div>
            </div>
        </div>

        <!-- AJALOO VAADE -->
        <div class="mt-8 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-xl font-bold mb-4">Analüüside ajalugu</h2>
            <div id="history-container" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "SINU_GOOGLE_APPS_SCRIPT_URL";

        async function init() {
            // Lae allikad tabelist ja täida rippmenüü
            const resp = await fetch(SCRIPT_URL);
            const data = await resp.json();
            const sources = [...new Set(data.data.map(d => d.source))];
            const select = document.getElementById('source-filter');
            sources.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s; opt.textContent = s;
                select.appendChild(opt);
            });
            // Lae ka ajalugu
            if(data.history) renderHistory(data.history);
        }

        async function generateNewReport() {
            const content = document.getElementById('ai-insight-content');
            content.innerHTML = "Analüüsin andmeid vastavalt metoodilisele rubriigile...";
            
            const resp = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "generate",
                    reportType: document.getElementById('report-type').value,
                    sourceFilter: document.getElementById('source-filter').value,
                    customPrompt: document.getElementById('ai-custom-prompt').value
                })
            });
            const res = await resp.json();
            content.innerHTML = res.insight;
            // Uuenda ka ajalugu
            location.reload(); 
        }

        function renderHistory(history) {
            const container = document.getElementById('history-container');
            container.innerHTML = history.reverse().map(item => `
                <div class="p-4 border-b">
                    <span class="text-xs text-gray-400">${item.date}</span>
                    <div class="text-sm mt-1">${item.content.substring(0, 150)}...</div>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
