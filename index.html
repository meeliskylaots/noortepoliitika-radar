<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peaeksperdi Radar | Lõimitud Noortepoliitika</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a',
                        accent: '#f97316',
                        danger: '#ef4444',
                        success: '#10b981'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .loader { border-top-color: #1e3a8a; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex overflow-hidden">

    <aside class="w-64 bg-primary text-white flex flex-col shadow-lg z-10 hidden md:flex">
        <div class="p-6">
            <h2 class="text-2xl font-bold tracking-wider">RADAR</h2>
            <p class="text-sm text-blue-300 mt-1">Lõimitud Noortepoliitika</p>
        </div>
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <a href="#" id="nav-peavaade" onclick="switchView('peavaade'); return false;" class="nav-item block py-2.5 px-4 rounded bg-blue-800">
                <i class="fas fa-chart-line mr-2 w-5 text-center"></i> Peavaade
            </a>
            <a href="#" id="nav-seaded" onclick="switchView('seaded'); return false;" class="nav-item block py-2.5 px-4 rounded hover:bg-blue-700">
                <i class="fas fa-cog mr-2 w-5 text-center"></i> Seaded
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-semibold text-gray-700" id="header-title">Analüüsi Töölaud</h1>
            <button onclick="fetchData()" class="text-sm bg-gray-100 px-3 py-1.5 rounded border shadow-sm flex items-center hover:bg-gray-200 transition-colors">
                <i class="fas fa-sync-alt mr-2 text-gray-500"></i> Uuenda
            </button>
        </header>

        <div class="p-6 flex-1 overflow-y-auto">
            <div id="loading" class="flex flex-col justify-center items-center py-32">
                <div class="loader h-16 w-16 border-4 border-t-4 border-gray-200 rounded-full mb-6"></div>
                <span class="text-xl text-gray-600">Loen andmeid...</span>
            </div>

            <div id="view-peavaade" class="hidden space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                    <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-blue-500 hover:shadow-md transition-shadow">
                        <p class="text-[10px] uppercase font-bold text-gray-500">Inimkesksus</p>
                        <p class="text-2xl font-bold text-blue-900" id="score-inim">--</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-green-500 hover:shadow-md transition-shadow">
                        <p class="text-[10px] uppercase font-bold text-gray-500">Elulisus</p>
                        <p class="text-2xl font-bold text-green-900" id="score-elul">--</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-yellow-500 hover:shadow-md transition-shadow">
                        <p class="text-[10px] uppercase font-bold text-gray-500">Arusaadavus</p>
                        <p class="text-2xl font-bold text-yellow-900" id="score-arus">--</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-purple-500 hover:shadow-md transition-shadow">
                        <p class="text-[10px] uppercase font-bold text-gray-500">Lõimitus</p>
                        <p class="text-2xl font-bold text-purple-900" id="score-loim">--</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-orange-500 hover:shadow-md transition-shadow">
                        <p class="text-[10px] uppercase font-bold text-gray-500">Tegevus</p>
                        <p class="text-2xl font-bold text-orange-900" id="score-tegev">--</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white rounded-xl shadow-sm p-6">
                        <h3 class="text-lg font-bold mb-4 text-gray-800">Skooride jaotus</h3>
                        <div class="relative h-64 w-full">
                            <canvas id="radarChart"></canvas>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-6 overflow-hidden flex flex-col">
                        <h3 class="text-lg font-bold mb-4 text-gray-800">Viimased analüüsitud tekstid</h3>
                        <div class="overflow-y-auto flex-1 pr-2">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="sticky top-0 bg-white">
                                    <tr>
                                        <th class="text-left text-xs font-bold text-gray-500 uppercase py-2">Allikas & Pealkiri</th>
                                        <th class="text-left text-xs font-bold text-gray-500 uppercase py-2">AI Tõlge</th>
                                    </tr>
                                </thead>
                                <tbody id="table-body" class="divide-y divide-gray-100"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxic9F7g8jwAgWnEMfg43KrHQGtsqltMWcrvg8icnT-FmQfzYJ_wXnv81Vq5hP6_GE_KQ/exec";
        let radarChart = null;

        async function fetchData() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('view-peavaade').classList.add('hidden');
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                render(data);
            } catch(e) { 
                console.error("Viga andmete laadimisel:", e);
                document.getElementById('loading').innerHTML = `<div class="text-red-500 text-center"><i class="fas fa-exclamation-triangle text-3xl mb-2"></i><br>Andmete laadimine ebaõnnestus.<br><span class="text-sm text-gray-500">${e.message}</span></div>`;
            }
        }

        function render(data) {
            let sums = {inimkesksus: 0, elulisus: 0, arusaadavus: 0, loimitus: 0, tegevusele_suunatus: 0};
            let count = 0;
            let tableHTML = "";

            // See on kõige olulisem muudatus: otsib andmeid nime järgi, ignoreerides suur-/väiketähti ja tühikuid
            const val = (row, key, altKey = "") => {
                if (!row) return null;
                const lowerKey = key.toLowerCase().trim();
                let found = Object.keys(row).find(k => k.toLowerCase().trim() === lowerKey);
                
                if (!found && altKey) {
                    const lowerAltKey = altKey.toLowerCase().trim();
                    found = Object.keys(row).find(k => k.toLowerCase().trim() === lowerAltKey);
                }
                return found ? row[found] : null;
            };

            data.forEach(row => {
                // Otsime numbrid üles kindlate veerunimede järgi
                const inim = Number(val(row, 'inimkesksus')) || 0;
                const elul = Number(val(row, 'elulisus')) || 0;
                const arus = Number(val(row, 'arusaadavus')) || 0;
                const loim = Number(val(row, 'loimitus')) || 0;
                const tegev = Number(val(row, 'tegevusele_suunatus', 'tegevus')) || 0;

                // Otsime tekstiandmed üles
                const title = val(row, 'title', 'pealkiri');
                const url = val(row, 'url', 'link');
                const source = val(row, 'source', 'allikas');
                const dateRaw = val(row, 'date', 'kuupäev');
                const tolge = val(row, 'tolge', 'rewrite');

                // Arvutame keskmisi AINULT siis, kui real on vähemalt mingid päris skoorid
                if (inim > 0 || elul > 0 || arus > 0 || loim > 0 || tegev > 0) {
                    sums.inimkesksus += inim;
                    sums.elulisus += elul;
                    sums.arusaadavus += arus;
                    sums.loimitus += loim;
                    sums.tegevusele_suunatus += tegev;
                    count++;
                }

                // Vormindame kuupäeva
                let dateStr = 'Kuupäev puudub';
                if (dateRaw) {
                    try {
                        const d = new Date(dateRaw);
                        if (!isNaN(d.getTime())) {
                            dateStr = d.toLocaleDateString('et-EE');
                        }
                    } catch(e) {}
                }

                const hasTranslation = tolge && String(tolge).trim() !== '' && String(tolge).trim() !== '-';
                const displayTitle = title ? title : 'Pealkiri puudub';
                const displaySource = source ? source : 'Teadmata allikas';
                const displayTolge = hasTranslation ? tolge : 'Ootab hindamist...';

                tableHTML += `<tr>
                    <td class="py-4 text-sm font-medium pr-4 w-1/2">
                        <a href="${url || '#'}" target="_blank" class="text-blue-700 hover:text-blue-900 transition-colors line-clamp-2" title="${displayTitle}">
                            ${displayTitle}
                        </a>
                        <div class="text-[11px] text-gray-500 mt-1.5 flex items-center">
                            <span class="bg-gray-100 px-1.5 py-0.5 rounded text-gray-600 mr-2"><i class="fas fa-building mr-1"></i> ${displaySource}</span>
                            <i class="far fa-clock mr-1"></i> ${dateStr}
                        </div>
                    </td>
                    <td class="py-4 text-sm text-gray-600 w-1/2">
                        <div class="bg-blue-50/50 p-2 rounded border border-blue-100 text-[13px] italic line-clamp-3" title="${displayTolge}">
                            "${displayTolge}"
                        </div>
                    </td>
                </tr>`;
            });

            const safeCount = count > 0 ? count : 1;

            document.getElementById('score-inim').innerText = count > 0 ? (sums.inimkesksus / safeCount).toFixed(1) : '--';
            document.getElementById('score-elul').innerText = count > 0 ? (sums.elulisus / safeCount).toFixed(1) : '--';
            document.getElementById('score-arus').innerText = count > 0 ? (sums.arusaadavus / safeCount).toFixed(1) : '--';
            document.getElementById('score-loim').innerText = count > 0 ? (sums.loimitus / safeCount).toFixed(1) : '--';
            document.getElementById('score-tegev').innerText = count > 0 ? (sums.tegevusele_suunatus / safeCount).toFixed(1) : '--';
            
            document.getElementById('table-body').innerHTML = tableHTML || '<tr><td colspan="2" class="text-center py-4 text-gray-500">Andmed puuduvad</td></tr>';

            const ctx = document.getElementById('radarChart').getContext('2d');
            if (radarChart) radarChart.destroy();
            
            radarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Inimkesksus', 'Elulisus', 'Arusaadavus', 'Lõimitus', 'Tegevus'],
                    datasets: [{
                        label: 'Keskmine skoor',
                        data: count > 0 ? [
                            sums.inimkesksus / safeCount,
                            sums.elulisus / safeCount,
                            sums.arusaadavus / safeCount,
                            sums.loimitus / safeCount,
                            sums.tegevusele_suunatus / safeCount
                        ] : [0, 0, 0, 0, 0],
                        backgroundColor: 'rgba(30, 58, 138, 0.2)',
                        borderColor: '#1e3a8a',
                        pointBackgroundColor: '#f97316',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#f97316',
                        borderWidth: 2
                    }]
                },
                options: { 
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { 
                        r: { 
                            min: 0, 
                            max: 10,
                            ticks: { stepSize: 2 },
                            pointLabels: { font: { size: 11, family: 'Inter' } }
                        } 
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });

            document.getElementById('loading').classList.add('hidden');
            document.getElementById('view-peavaade').classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', fetchData);
        function switchView(v) {
            // Placeholder for future navigation logic
            console.log("Switching view to:", v);
        }
    </script>
</body>
</html>
