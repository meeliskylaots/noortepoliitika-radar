<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>RADAR 3.0 | Strateegiline Seire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex h-screen">

    <aside class="w-64 bg-slate-950 text-white p-6">
        <h1 class="text-2xl font-black">RADAR <span class="text-blue-500">3.0</span></h1>
        <nav class="mt-8 space-y-2">
            <button onclick="switchView('view-main')" class="w-full text-left p-3 bg-blue-600 rounded">Töölaud</button>
            <button onclick="switchView('view-history')" class="w-full text-left p-3 hover:bg-slate-900 rounded">Arhiiv</button>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <div id="view-main" class="grid grid-cols-3 gap-8">
            <div id="recent-texts-container" class="col-span-1 space-y-2">
                <h3 class="text-xs font-bold uppercase text-slate-400">Allikad</h3>
                <p>Laadin andmeid...</p>
            </div>
            <div class="col-span-2 bg-white p-6 rounded shadow">
                <select id="report-type" class="w-full border p-2 mb-4">
                    <option value="maine">Mainekujunduse audit</option>
                    <option value="loimitus">Valdkondade lõimituse raport</option>
                    <option value="vabavorm">VABA PÄRING</option>
                </select>
                <textarea id="ai-custom-prompt" class="w-full border p-2 mb-4" placeholder="Sinu suunised AI-le..."></textarea>
                <button onclick="generateReport()" id="gen-btn" class="w-full bg-blue-900 text-white py-2 rounded">Käivita analüüs</button>
                
                <div id="ai-insight-content" class="mt-6 prose"></div>
                <div id="action-btns" class="hidden flex gap-2 mt-4">
                    <button onclick="window.print()" class="bg-gray-200 px-3 py-1 rounded text-xs font-bold">Salvesta PDF</button>
                    <button onclick="saadaMeiliga()" class="bg-blue-600 text-white px-3 py-1 rounded text-xs font-bold">Saada e-mailile</button>
                </div>
            </div>
        </div>

        <div id="view-history" class="hidden">
            <div id="history-container"></div>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwU1_EhiDmRyrUscZ-8BLy2RxDeWdO2m46Eme4h-nPn9e64vo7abR6xUfLT3QV1TLDEiw/exec";

        function switchView(viewId) {
            document.getElementById('view-main').classList.toggle('hidden', viewId !== 'view-main');
            document.getElementById('view-history').classList.toggle('hidden', viewId !== 'view-history');
        }

        async function fetchData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
               document.getElementById('recent-texts-container').innerHTML = data.news.map(n => `
    <div class="p-4 bg-white border border-slate-200 rounded-lg shadow-sm hover:shadow-md transition text-sm mb-3">
        <a href="${n.link}" target="_blank" class="font-bold text-blue-900 hover:underline block leading-tight mb-2">
            ${n.title}
        </a>
        <div class="flex justify-between items-center text-[10px] text-slate-500 uppercase font-bold tracking-wider mb-2">
            <span>${n.source}</span>
            <span>${n.date}</span>
        </div>
        <p class="text-xs text-slate-600 leading-relaxed italic border-t pt-2">
            ${n.summary}
        </p>
    </div>
`).join('');
               // Uuendatud ajaloo kuvamine
document.getElementById('history-container').innerHTML = data.history.map(h => `
    <div class="bg-white p-6 border border-slate-200 rounded-lg shadow-sm mb-4">
        <div class="flex justify-between items-center mb-4">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                ${new Date(h.date).toLocaleDateString('et-EE')}
            </span>
        </div>
        <div class="prose text-sm text-slate-700 leading-relaxed">
            ${h.content}
        </div>
    </div>
`).join('');
            } catch (err) { console.error(err); }
        }

        async function generateReport() {
            const btn = document.getElementById('gen-btn');
            btn.innerText = "Analüüsin...";
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "generate", customPrompt: document.getElementById('ai-custom-prompt').value })
            });
            const data = await res.json();
            // Puhastatud kuvamine: eemaldame JSONi sümbolid
            const clean = data.insight.replace(/[\{\}\"]/g, '').replace(/\\n/g, '<br>');
            document.getElementById('ai-insight-content').innerHTML = clean;
            document.getElementById('action-btns').classList.remove('hidden');
            btn.innerText = "Käivita analüüs";
        }

        async function saadaMeiliga() {
            const content = document.getElementById('ai-insight-content').innerHTML;
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "sendEmail", content: content })
            });
            alert("Raport on teele pandud!");
        }

        window.onload = fetchData;
    </script>
</body>
</html>
