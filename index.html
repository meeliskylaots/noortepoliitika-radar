<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADAR 3.4 | Strateegiline Juhtimispaneel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-link { @apply flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 hover:bg-blue-50 hover:text-blue-600 transition-all font-medium w-full text-left; }
        .sidebar-link.active { @apply bg-blue-600 text-white shadow-lg shadow-blue-200; }
        .kpi-card { @apply bg-white p-6 rounded-2xl border border-slate-100 shadow-sm transition-transform; }
        .main-card { @apply bg-white p-8 rounded-3xl border border-slate-100 shadow-sm; }
        .scroll-area { height: 600px; overflow-y: auto; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 bg-white border-r border-slate-100 p-6 flex flex-col">
        <div class="mb-10 px-4">
            <h1 class="text-2xl font-bold text-slate-900">RADAR <span class="text-blue-600">3.4</span></h1>
            <p class="text-slate-400 text-xs mt-1 uppercase tracking-widest">Strateegiline Seire</p>
        </div>
        <nav class="flex flex-col gap-2 flex-1">
            <button onclick="switchView('view-main')" class="sidebar-link active" id="nav-main">📊 Töölaud</button>
            <button onclick="switchView('view-history')" class="sidebar-link" id="nav-history">📜 Arhiiv</button>
            <button class="sidebar-link opacity-50 cursor-not-allowed">⚙️ Seaded</button>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <header class="flex justify-between items-center mb-10">
            <div><h2 class="text-3xl font-bold text-slate-900">Tere tulemast, Peaekspert</h2></div>
            <span class="text-xs font-semibold bg-green-100 text-green-700 px-3 py-1 rounded-full uppercase">Süsteem Aktiivne</span>
        </header>

        <div class="grid grid-cols-4 gap-6 mb-10">
            <div class="kpi-card"><p class="text-slate-400 text-xs uppercase">Allikaid</p><h4 class="text-2xl font-bold text-slate-900">12</h4></div>
            <div class="kpi-card"><p class="text-slate-400 text-xs uppercase">Uudiseid</p><h4 class="text-2xl font-bold text-slate-900">3</h4></div>
            <div class="kpi-card"><p class="text-slate-400 text-xs uppercase">Raport</p><h4 class="text-2xl font-bold text-slate-900">Täna</h4></div>
            <div class="kpi-card"><p class="text-slate-400 text-xs uppercase">Maine</p><h4 class="text-2xl font-bold text-blue-600">84%</h4></div>
        </div>

        <div id="view-main" class="grid grid-cols-12 gap-8">
            <div class="col-span-4">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Viimased sündmused</h3>
                <div id="recent-texts-container" class="scroll-area space-y-3 pr-2">Laadin...</div>
            </div>
            <div class="col-span-8">
                <div class="main-card">
                    <textarea id="ai-custom-prompt" class="w-full p-4 bg-slate-50 rounded-xl mb-4 h-32 border-none" placeholder="Kirjelda oma strateegilist fookust..."></textarea>
                    <button onclick="generateReport()" id="gen-btn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-slate-800 transition">Käivita analüüs</button>
                </div>
                <div id="ai-insight-content" class="mt-8 space-y-6"></div>
            </div>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwU1_EhiDmRyrUscZ-8BLy2RxDeWdO2m46Eme4h-nPn9e64vo7abR6xUfLT3QV1TLDEiw/exec";

        async function fetchData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                
                // Kontrollime, kas 'news' on olemas ja on massiiv
                if (data && Array.isArray(data.news)) {
                    document.getElementById('recent-texts-container').innerHTML = data.news.map(n => `
                        <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm hover:border-blue-200 transition">
                            <a href="${n.link}" target="_blank" class="font-semibold text-slate-900 text-sm block mb-1 hover:text-blue-600">${n.title}</a>
                            <div class="flex justify-between items-center text-[10px] text-slate-400 uppercase font-bold">
                                <span>${n.source || 'Allikas'}</span>
                                <span>${n.date || ''}</span>
                            </div>
                        </div>`).join('');
                } else {
                    document.getElementById('recent-texts-container').innerHTML = "<p>Andmeid ei leitud.</p>";
                }
            } catch (err) {
                console.error("Viga andmete laadimisel:", err);
                document.getElementById('recent-texts-container').innerHTML = "<p>Viga andmete laadimisel.</p>";
            }
        }
        
        window.onload = fetchData;
    </script>
</body>
</html>
